name: Deploy OSS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ossutil
        run: |
          curl -fL --retry 3 --retry-delay 2 -o ossutil-2.2.1-linux-amd64.zip https://gosspublic.alicdn.com/ossutil/v2/2.2.1/ossutil-2.2.1-linux-amd64.zip
          unzip -tq ossutil-2.2.1-linux-amd64.zip
          unzip -q ossutil-2.2.1-linux-amd64.zip
          mv ossutil-2.2.1-linux-amd64/ossutil ./ossutil
          chmod +x ./ossutil

      - name: Remove excluded directories and files
        run: |
          rm -rf .git .github ossutil_output
          rm -f readme.md readme_en.md wrangler.jsonc .gitignore

      - name: Configure OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: |
          ./ossutil config --endpoint $OSS_ENDPOINT --access-key-id $OSS_ACCESS_KEY_ID --access-key-secret $OSS_ACCESS_KEY_SECRET

      - name: Sync to OSS
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          ./ossutil sync ./ oss://$OSS_BUCKET -f --update --delete \
            --exclude "*.md" \
            --exclude "*.json" \
            --exclude "ossutil" \
            --exclude "ossutil_output/*"
