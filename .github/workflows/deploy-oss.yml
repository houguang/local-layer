name: Deploy OSS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ossutil
        run: |
          curl -fL --retry 3 --retry-delay 2 -o ossutil-2.2.1-linux-amd64.zip https://gosspublic.alicdn.com/ossutil/v2/2.2.1/ossutil-2.2.1-linux-amd64.zip
          unzip -tq ossutil-2.2.1-linux-amd64.zip
          unzip -q ossutil-2.2.1-linux-amd64.zip
          mv ossutil-2.2.1-linux-amd64/ossutil ./ossutil
          chmod +x ./ossutil

      - name: Remove excluded directories
        run: |
          rm -rf .git .github ossutil-2.2.1-linux-amd64 ossutil-2.2.1-linux-amd64.zip

      - name: Sync to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          REGION="$(echo "$OSS_ENDPOINT" | sed -E 's#https?://##; s#/.*##; s#^oss-([^.]+)\..*$#\1#; s#^[^.]+\.oss-([^.]+)\..*$#\1#; s#-internal$##')"
          ./ossutil sync ./ oss://$OSS_BUCKET -f --update --delete --sign-version v4 --region "$REGION" --endpoint $OSS_ENDPOINT --access-key-id $OSS_ACCESS_KEY_ID --access-key-secret $OSS_ACCESS_KEY_SECRET \
            --exclude "*.md" \
            --exclude "*.json*" \
            --exclude ".*" \
            --exclude "ossutil" \
